
services:
  parsedmarc:
    build: ./parsedmarc/
    volumes:
      - ./files:/input:ro
      - ./output_files:/output
      - ./parsedmarc/parsedmarc.ini:/etc/parsedmarc/parsedmarc.ini
      - ./credentials.json:/etc/parsedmarc/credentials.json
      # Pre-generated token (generate_token.py). Mounted read-write so
      # parsedmarc can refresh and write back the access token.
      - ./token.json:/etc/parsedmarc/token.json
    command: parsedmarc -c /etc/parsedmarc/parsedmarc.ini --debug
    depends_on:
      - elasticsearch
    restart: on-failure

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.16.5
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      # Cap the JVM heap. By default ES grabs ~50% of host RAM, which is
      # far more than this DMARC visualizer needs.
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    deploy:
      resources:
        limits:
          memory: 2g
    volumes:
      - elastic_data:/usr/share/elasticsearch/data

  grafana:
    build: ./grafana/
    ports:
      - 13000:3000
    user: root
    environment:
      GF_INSTALL_PLUGINS: grafana-piechart-panel,grafana-worldmap-panel
      GF_AUTH_ANONYMOUS_ENABLED: 'true'

  cloudflared:
    #profile:
    #  - dummy
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      # Tunnel token created in the Cloudflare Zero Trust dashboard.
      # Ingress routing is configured there (e.g. point a hostname to
      # http://grafana:3000).
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - grafana
    restart: unless-stopped

volumes:
  elastic_data:
    driver: local
