
# Cap log file growth: rotate at 10MB and keep at most 10 files per container.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "10"

services:
  parsedmarc:
    build: ./parsedmarc/
    logging: *default-logging
    volumes:
      - ./files:/input:ro
      - ./output_files:/output
      - ./parsedmarc/parsedmarc.ini:/etc/parsedmarc/parsedmarc.ini
      - ./credentials.json:/etc/parsedmarc/credentials.json
      # Pre-generated token (generate_token.py). Mounted read-write so
      # parsedmarc can refresh and write back the access token.
      - ./token.json:/etc/parsedmarc/token.json
      - geoip_data:/usr/share/GeoIP:ro
    command: parsedmarc -c /etc/parsedmarc/parsedmarc.ini --debug
    depends_on:
      - elasticsearch
      - geoipupdate
    restart: on-failure

  geoipupdate:
    image: ghcr.io/maxmind/geoipupdate:latest
    container_name: geoipupdate
    restart: unless-stopped
    environment:
      - GEOIPUPDATE_ACCOUNT_ID=あなたのアカウントID
      - GEOIPUPDATE_LICENSE_KEY=あなたのライセンスキー
      # 無料のGeoLite2を指定。CityとCountryの両方（または片方）を指定
      - GEOIPUPDATE_EDITION_IDS=GeoLite2-City GeoLite2-Country
      # 自動更新の間隔（時間単位）。72時間（3日）ごとに自動チェック
      - GEOIPUPDATE_FREQUENCY=72
    volumes:
      - geoip_data:/usr/share/GeoIP


  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.16.5
    logging: *default-logging
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      # Cap the JVM heap. By default ES grabs ~50% of host RAM, which is
      # far more than this DMARC visualizer needs.
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    deploy:
      resources:
        limits:
          memory: 2g
    volumes:
      - elastic_data:/usr/share/elasticsearch/data

  grafana:
    build: ./grafana/
    logging: *default-logging
    ports:
      - 13000:3000
    user: root
    environment:
      GF_INSTALL_PLUGINS: grafana-piechart-panel,grafana-worldmap-panel
      GF_AUTH_ANONYMOUS_ENABLED: 'true'

  cloudflared:
    #profile:
    #  - dummy
    image: cloudflare/cloudflared:latest
    logging: *default-logging
    command: tunnel --no-autoupdate run
    environment:
      # Tunnel token created in the Cloudflare Zero Trust dashboard.
      # Ingress routing is configured there (e.g. point a hostname to
      # http://grafana:3000).
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - grafana
    restart: unless-stopped

volumes:
  geoip_data:

  elastic_data:
    driver: local
